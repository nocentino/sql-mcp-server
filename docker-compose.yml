services:
  # SQL Server 2025 (latest with advanced features)
  sqlserver1:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: sql-mcp-sqlserver1
    hostname: sqlserver1
    environment:
      - ACCEPT_EULA=${ACCEPT_EULA:-Y}
      - MSSQL_SA_PASSWORD=${SA_PASSWORD:-S0methingS@Str0ng!}
      - MSSQL_PID=Developer
      - MSSQL_ENABLE_HADR=1
    ports:
      - "1433:1433"
    volumes:
      - sql-data:/var/opt/mssql
      - ag-certs:/var/opt/ag-certs
      - ag-backups:/var/opt/mssql/backup
      - ./scripts/ag/init-sqlserver1.sql:/docker-entrypoint-initdb.d/init-sqlserver1.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${SA_PASSWORD:-S0methingS@Str0ng!}\" -C -l 5 -t 5 -h -1 -Q \"SET NOCOUNT ON; SELECT 'PROBEOK'\" 2>/dev/null | grep -q '^PROBEOK$$'"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - sql-mcp-network
    restart: unless-stopped

  # Initialize database with sample data and DBA monitoring infrastructure
  sql-init:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: sql-mcp-init
    depends_on:
      sqlserver1:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts:ro
    command: >
      /bin/bash -c "
        echo 'Waiting for SQL Server to be ready...' &&
        sleep 10 &&
        echo 'Initializing ProductsDB and dba_monitor account...' &&
        /opt/mssql-tools18/bin/sqlcmd -S sqlserver1 -U sa -P '${SA_PASSWORD:-S0methingS@Str0ng!}' -C -i /scripts/ag/init-sqlserver1.sql &&
        echo 'All initialization complete!'
      "
    networks:
      - sql-mcp-network

  # Data API Builder MCP Server — ProductsDB application access only
  dab-mcp:
    image: mcr.microsoft.com/azure-databases/data-api-builder:2.0.1-rc
    container_name: sql-mcp-dab
    hostname: dab-mcp
    environment:
      - MSSQL_CONNECTION_STRING=Server=sqlserver1,1433;Database=${SQL_DATABASE:-ProductsDB};User ID=dab_app;Password=DabP@ss123!;Encrypt=false;TrustServerCertificate=true;
    ports:
      - "5001:5000"
    volumes:
      - ./dab-config.json:/App/dab-config.json:ro
    depends_on:
      sql-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - sql-mcp-network
    restart: unless-stopped

  # Second SQL Server 2025 instance — used for multi-instance testing
  sqlserver2:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: sql-mcp-sqlserver2
    hostname: sqlserver2
    environment:
      - ACCEPT_EULA=${ACCEPT_EULA:-Y}
      - MSSQL_SA_PASSWORD=${SA_PASSWORD:-S0methingS@Str0ng!}
      - MSSQL_PID=Developer
      - MSSQL_ENABLE_HADR=1
    ports:
      - "1434:1433"
    volumes:
      - ag-certs:/var/opt/ag-certs
      - ag-backups:/var/opt/mssql/backup
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${SA_PASSWORD:-S0methingS@Str0ng!}\" -C -l 5 -t 5 -h -1 -Q \"SET NOCOUNT ON; SELECT 'PROBEOK'\" 2>/dev/null | grep -q '^PROBEOK$$'"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - sql-mcp-network
    restart: unless-stopped

  # Create dba_monitor on sqlserver2 (mirrors the account on sqlserver1)
  sql-init-sqlserver2:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: sql-mcp-init-sqlserver2
    depends_on:
      sqlserver2:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts:ro
    command: >
      /bin/bash -c "
        echo 'Creating dba_monitor on sqlserver2...' &&
        /opt/mssql-tools18/bin/sqlcmd -S sqlserver2 -U sa -P '${SA_PASSWORD:-S0methingS@Str0ng!}' -C -i /scripts/ag/init-sqlserver2.sql &&
        echo 'sqlserver2 initialization complete!'
      "
    networks:
      - sql-mcp-network

  # SQL Server DBA MCP Server — full T-SQL access to DMVs for agent-driven monitoring
  sql-mcp-server:
    build: ./sql-mcp-server
    container_name: sql-mcp-dba
    env_file:
      - .env
    ports:
      - "3001:3000"
    depends_on:
      sql-init:
        condition: service_completed_successfully
      sql-init-sqlserver2:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - sql-mcp-network
    restart: unless-stopped

volumes:
  sql-data:
    driver: local
  ag-certs:
    driver: local
  ag-backups:
    driver: local

networks:
  sql-mcp-network:
    driver: bridge
